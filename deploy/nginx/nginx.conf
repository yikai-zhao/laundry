upstream backend_api {
    server backend-api:8000;
}

upstream staff_app {
    server staff-app:80;
}

upstream customer_sign {
    server customer-sign:80;
}

upstream admin_dashboard {
    server admin-dashboard:80;
}

# Staff App — staff.yourdomain.com
server {
    listen 80;
    server_name staff.yourdomain.com;
    client_max_body_size 10M;

    location / {
        proxy_pass http://staff_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Customer Sign — sign.yourdomain.com
server {
    listen 80;
    server_name sign.yourdomain.com;
    client_max_body_size 10M;

    location / {
        proxy_pass http://customer_sign;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Admin Dashboard — admin.yourdomain.com
server {
    listen 80;
    server_name admin.yourdomain.com;
    client_max_body_size 10M;

    location / {
        proxy_pass http://admin_dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# API — api.yourdomain.com
server {
    listen 80;
    server_name api.yourdomain.com;
    client_max_body_size 10M;

    location / {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /storage/ {
        proxy_pass http://backend_api/storage/;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }
}

# Default — return 444 for unmatched hosts
server {
    listen 80 default_server;
    return 444;
}
