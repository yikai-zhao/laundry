services:
  postgres:
    image: postgres:15
    container_name: laundry-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: laundry
      POSTGRES_PASSWORD: laundry
      POSTGRES_DB: laundry_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: laundry-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend-api:
    build:
      context: ./backend/api-service
    container_name: laundry-backend-api
    restart: unless-stopped
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://laundry:laundry@postgres:5432/laundry_db
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  ai-service:
    build:
      context: ./ai-service
    container_name: laundry-ai-service
    restart: unless-stopped
    ports:
      - "8100:8100"

volumes:
  pg_data:
