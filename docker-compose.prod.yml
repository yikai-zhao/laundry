services:
  postgres:
    image: postgres:15
    container_name: laundry-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-laundry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-laundry_db}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-laundry}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-api:
    build:
      context: ./backend/api-service
    container_name: laundry-backend-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-laundry}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-laundry_db}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-10485760}
    volumes:
      - photo_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy

  staff-app:
    build:
      context: ./frontend/staff-app
      args:
        VITE_API_BASE_URL: ${API_BASE_URL}
    container_name: laundry-staff-app
    restart: unless-stopped

  customer-sign:
    build:
      context: ./frontend/customer-sign
      args:
        VITE_API_BASE_URL: ${API_BASE_URL}
    container_name: laundry-customer-sign
    restart: unless-stopped

  admin-dashboard:
    build:
      context: ./frontend/admin-dashboard
      args:
        VITE_API_BASE_URL: ${API_BASE_URL}
    container_name: laundry-admin-dashboard
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: laundry-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-api
      - staff-app
      - customer-sign
      - admin-dashboard

volumes:
  pg_data:
  photo_storage:
